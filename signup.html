<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Rubik+Puddles&display=swap"
      rel="stylesheet"
    />
    <title>Sign Up – CLOTHLESS</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/signup.css" />
  </head>
  <body>
    <header class="navbar">
      <h2 class="logo"><a href="index.html">CLOTHLESS</a></h2>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#gallery">Gallery</a></li>
        <li>
          <a href="https://github.com/waterthefork" target="_blank">GitHub</a>
        </li>
      </ul>
    </header>

    <main class="signup-layout">
      <div class="signup-panel" aria-hidden="true">
        <img src="images/andrej-lisakov-Yy4sN6QzboU-unsplash.jpg" alt="" />
        <div class="panel-overlay">
          <p class="panel-tagline">Nothing to wear?<br />Perfect.</p>
        </div>
      </div>

      <div class="signup-form-wrap">
        <div class="form-container">
          <p class="eyebrow">Welcome to the movement</p>
          <h1>Join CLOTHLESS</h1>
          <p class="subtitle">World's first invisible fashion brand.</p>

          <form action="" novalidate>
            <div class="form-row">
              <div class="form-group">
                <label for="first-name">First Name</label>
                <input
                  type="text"
                  id="first-name"
                  name="first-name"
                  placeholder="Ada"
                  required
                />
              </div>
              <div class="form-group">
                <label for="last-name">Last Name</label>
                <input
                  type="text"
                  id="last-name"
                  name="last-name"
                  placeholder="Lovelace"
                  required
                />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="email">Email</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="ada@clothless.com"
                  required
                />
              </div>
              <div class="form-group">
                <label for="phone-number">Phone Number</label>
                <input
                  type="tel"
                  id="phone-number"
                  name="phone-number"
                  placeholder="+1 555 000 0000"
                  required
                />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" name="dob" required />
              </div>
              <div class="form-group">
                <label for="sex">Sex</label>
                <select id="sex" name="sex" required>
                  <option value="">Select</option>
                  <option value="male">Male</option>
                  <option value="female">Female</option>
                  <option value="other">Other</option>
                </select>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group full-width">
                <label for="password">Password</label>
                <input
                  type="password"
                  name="password"
                  id="password"
                  placeholder="Min. 8 characters"
                  required
                  minlength="8"
                />
              </div>
            </div>

            <div class="button-group">
              <button type="submit" class="btn btn-primary">
                Create Account
              </button>
              <button type="reset" class="btn btn-ghost">Clear</button>
            </div>

            <p class="signin-link">
              Already have an account? <a href="#">Sign in</a>
            </p>
          </form>
        </div>
      </div>
    </main>
  </body>
</html>
